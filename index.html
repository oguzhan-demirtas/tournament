<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tournament App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen">
        <h1>Food Tournament</h1>
        <button onclick="startGame()">Start</button>
    </div>

    <!-- MATCH SCREEN -->
    <div id="match-screen" style="display:none;">
        <h2 id="round-title"></h2>

        <div class="match">
            <div class="card" onclick="selectWinner(0)">
                <img id="img1">
                <p id="name1"></p>
            </div>

            <h1>VS</h1>

            <div class="card" onclick="selectWinner(1)">
                <img id="img2">
                <p id="name2"></p>
            </div>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" style="display:none;">
        <h1>Champion</h1>
        <img id="winner-img">
        <h2 id="winner-name"></h2>
        <button onclick="restart()">Restart</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
